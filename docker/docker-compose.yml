version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: medsignal-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: medsignal-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  postgres:
    image: postgres:15
    container_name: medsignal-postgres
    environment:
      POSTGRES_DB: medsignal
      POSTGRES_USER: medsignal
      POSTGRES_PASSWORD: medsignal
    ports:
      - "5431:5431"
    volumes:
      - pgdata:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: medsignal-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma

  pgadmin:
    image: dpage/pgadmin4
    container_name: medsignal-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medsignal.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
  chromadata: